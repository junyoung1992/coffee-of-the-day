openapi: 3.0.3
info:
  title: Coffee of the Day API
  description: 커피 기록(카페 방문 / 홈브루) CRUD API
  version: 0.1.0

servers:
  - url: http://localhost:8080
    description: 로컬 개발 서버

tags:
  - name: logs
    description: 커피 기록 관리

paths:
  /api/v1/logs:
    post:
      summary: 커피 기록 생성
      tags: [logs]
      parameters:
        - $ref: '#/components/parameters/XUserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLogRequest'
      responses:
        '201':
          description: 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoffeeLogResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    get:
      summary: 커피 기록 목록 조회
      tags: [logs]
      parameters:
        - $ref: '#/components/parameters/XUserId'
        - name: log_type
          in: query
          schema:
            $ref: '#/components/schemas/LogType'
          description: 로그 타입 필터
        - name: date_from
          in: query
          schema:
            type: string
            example: '2026-01-01'
          description: 시작 날짜 필터 (YYYY-MM-DD 또는 RFC3339)
        - name: date_to
          in: query
          schema:
            type: string
            example: '2026-03-31'
          description: 종료 날짜 필터 (YYYY-MM-DD 또는 RFC3339)
        - name: cursor
          in: query
          schema:
            type: string
          description: 페이지네이션 커서 (이전 응답의 next_cursor 값)
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: 페이지당 항목 수
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListLogsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/logs/{id}:
    get:
      summary: 커피 기록 단건 조회
      tags: [logs]
      parameters:
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/LogId'
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoffeeLogResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      summary: 커피 기록 수정
      tags: [logs]
      parameters:
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/LogId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLogRequest'
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoffeeLogResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: 커피 기록 삭제
      tags: [logs]
      parameters:
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/LogId'
      responses:
        '204':
          description: 삭제 성공
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    XUserId:
      name: X-User-Id
      in: header
      required: true
      schema:
        type: string
      description: 사용자 식별자 (POC 단계; Phase 4에서 JWT로 교체)

    LogId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: 커피 기록 ID

  responses:
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: X-User-Id 헤더 누락
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 기록을 찾을 수 없거나 다른 사용자 소유
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    LogType:
      type: string
      enum: [cafe, brew]
      description: cafe = 바리스타가 추출, brew = 내가 직접 추출

    RoastLevel:
      type: string
      enum: [light, medium, dark]

    BrewMethod:
      type: string
      enum: [pour_over, immersion, aeropress, espresso, moka_pot, siphon, cold_brew, other]

    CafeDetail:
      type: object
      required: [cafe_name, coffee_name]
      properties:
        cafe_name:
          type: string
          example: 블루보틀 성수
        location:
          type: string
          nullable: true
        coffee_name:
          type: string
          example: 싱글 오리진 드립
        bean_origin:
          type: string
          nullable: true
        bean_process:
          type: string
          nullable: true
        roast_level:
          type: string
          enum: [light, medium, dark]
          nullable: true
        tasting_tags:
          type: array
          items:
            type: string
          example: [초콜릿, 체리]
        tasting_note:
          type: string
          nullable: true
        impressions:
          type: string
          nullable: true
        rating:
          type: number
          minimum: 0.5
          maximum: 5.0
          multipleOf: 0.5
          nullable: true

    BrewDetail:
      type: object
      required: [bean_name, brew_method]
      properties:
        bean_name:
          type: string
          example: 에티오피아 예가체프 G1
        bean_origin:
          type: string
          nullable: true
        bean_process:
          type: string
          nullable: true
        roast_level:
          type: string
          enum: [light, medium, dark]
          nullable: true
        roast_date:
          type: string
          format: date
          nullable: true
        tasting_tags:
          type: array
          items:
            type: string
        tasting_note:
          type: string
          nullable: true
        brew_method:
          $ref: '#/components/schemas/BrewMethod'
        brew_device:
          type: string
          nullable: true
          example: Origami
        coffee_amount_g:
          type: number
          nullable: true
        water_amount_ml:
          type: number
          nullable: true
        water_temp_c:
          type: number
          nullable: true
        brew_time_sec:
          type: integer
          nullable: true
        grind_size:
          type: string
          nullable: true
        brew_steps:
          type: array
          items:
            type: string
        impressions:
          type: string
          nullable: true
        rating:
          type: number
          minimum: 0.5
          maximum: 5.0
          multipleOf: 0.5
          nullable: true

    CoffeeLogResponse:
      type: object
      required: [id, user_id, recorded_at, companions, log_type, created_at, updated_at]
      properties:
        id:
          type: string
        user_id:
          type: string
        recorded_at:
          type: string
          format: date-time
        companions:
          type: array
          items:
            type: string
        log_type:
          $ref: '#/components/schemas/LogType'
        memo:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        cafe:
          $ref: '#/components/schemas/CafeDetail'
        brew:
          $ref: '#/components/schemas/BrewDetail'

    CreateLogRequest:
      type: object
      required: [recorded_at, log_type]
      properties:
        recorded_at:
          type: string
          description: RFC3339 또는 YYYY-MM-DD
          example: '2026-03-29T10:00:00Z'
        companions:
          type: array
          items:
            type: string
        log_type:
          $ref: '#/components/schemas/LogType'
        memo:
          type: string
          nullable: true
        cafe:
          $ref: '#/components/schemas/CafeDetail'
          nullable: true
        brew:
          $ref: '#/components/schemas/BrewDetail'
          nullable: true

    UpdateLogRequest:
      type: object
      required: [recorded_at, log_type]
      properties:
        recorded_at:
          type: string
          description: RFC3339 또는 YYYY-MM-DD
        companions:
          type: array
          items:
            type: string
        log_type:
          $ref: '#/components/schemas/LogType'
        memo:
          type: string
          nullable: true
        cafe:
          $ref: '#/components/schemas/CafeDetail'
          nullable: true
        brew:
          $ref: '#/components/schemas/BrewDetail'
          nullable: true

    ListLogsResponse:
      type: object
      required: [items, has_next]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CoffeeLogResponse'
        next_cursor:
          type: string
          nullable: true
          description: 다음 페이지 커서 (has_next가 false이면 null)
        has_next:
          type: boolean
          description: 다음 페이지 존재 여부

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: X-User-Id 헤더가 필요합니다
