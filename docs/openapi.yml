openapi: 3.0.3
info:
  title: Coffee of the Day API
  description: 커피 기록(카페 방문 / 홈브루) CRUD API
  version: 0.2.0

servers:
  - url: http://localhost:8080
    description: 로컬 개발 서버

security:
  - cookieAuth: []

tags:
  - name: auth
    description: 회원가입 / 로그인 / 토큰 관리
  - name: logs
    description: 커피 기록 관리
  - name: presets
    description: 즐겨찾기 프리셋 관리
  - name: suggestions
    description: 자동완성 제안

paths:
  /api/v1/auth/register:
    post:
      summary: 회원가입
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: 회원가입 성공 (액세스/리프레시 토큰 쿠키 설정)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/auth/login:
    post:
      summary: 로그인
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 로그인 성공 (액세스/리프레시 토큰 쿠키 설정)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/refresh:
    post:
      summary: 액세스 토큰 갱신
      tags: [auth]
      security: []
      description: 리프레시 토큰 쿠키를 사용하여 새 토큰 쌍을 발급한다.
      responses:
        '204':
          description: 갱신 성공 (새 토큰 쿠키 설정)
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/logout:
    post:
      summary: 로그아웃
      tags: [auth]
      security: []
      responses:
        '204':
          description: 로그아웃 성공 (토큰 쿠키 만료 처리)

  /api/v1/auth/me:
    get:
      summary: 현재 로그인된 사용자 정보 조회
      tags: [auth]
      responses:
        '200':
          description: 사용자 정보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/logs:
    post:
      summary: 커피 기록 생성
      tags: [logs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLogRequest'
      responses:
        '201':
          description: 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoffeeLogResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    get:
      summary: 커피 기록 목록 조회
      tags: [logs]
      parameters:
        - name: log_type
          in: query
          schema:
            $ref: '#/components/schemas/LogType'
          description: 로그 타입 필터
        - name: date_from
          in: query
          schema:
            type: string
            example: '2026-01-01'
          description: 시작 날짜 필터 (YYYY-MM-DD 또는 RFC3339)
        - name: date_to
          in: query
          schema:
            type: string
            example: '2026-03-31'
          description: 종료 날짜 필터 (YYYY-MM-DD 또는 RFC3339)
        - name: cursor
          in: query
          schema:
            type: string
          description: 페이지네이션 커서 (이전 응답의 next_cursor 값)
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: 페이지당 항목 수
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListLogsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/logs/{id}:
    get:
      summary: 커피 기록 단건 조회
      tags: [logs]
      parameters:
        - $ref: '#/components/parameters/LogId'
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoffeeLogResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      summary: 커피 기록 수정
      tags: [logs]
      parameters:
        - $ref: '#/components/parameters/LogId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLogRequest'
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoffeeLogResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: 커피 기록 삭제
      tags: [logs]
      parameters:
        - $ref: '#/components/parameters/LogId'
      responses:
        '204':
          description: 삭제 성공
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/presets:
    post:
      summary: 프리셋 생성
      tags: [presets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePresetRequest'
      responses:
        '201':
          description: 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresetResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    get:
      summary: 프리셋 목록 조회 (최근 사용순)
      tags: [presets]
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPresetsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/presets/{id}:
    get:
      summary: 프리셋 단건 조회
      tags: [presets]
      parameters:
        - $ref: '#/components/parameters/PresetId'
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresetResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      summary: 프리셋 수정
      tags: [presets]
      parameters:
        - $ref: '#/components/parameters/PresetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePresetRequest'
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresetResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: 프리셋 삭제
      tags: [presets]
      parameters:
        - $ref: '#/components/parameters/PresetId'
      responses:
        '204':
          description: 삭제 성공
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/presets/{id}/use:
    post:
      summary: 프리셋 사용 기록 (last_used_at 갱신)
      tags: [presets]
      parameters:
        - $ref: '#/components/parameters/PresetId'
      responses:
        '204':
          description: 사용 기록 성공
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/suggestions/tags:
    get:
      summary: 테이스팅 태그 자동완성 제안
      tags: [suggestions]
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: 검색어 (빈 문자열이면 전체 반환)
      responses:
        '200':
          description: 제안 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuggestionsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/suggestions/companions:
    get:
      summary: 동반자 자동완성 제안
      tags: [suggestions]
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: 검색어 (빈 문자열이면 전체 반환)
      responses:
        '200':
          description: 제안 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuggestionsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token
      description: httpOnly 쿠키에 저장된 JWT 액세스 토큰

  parameters:
    LogId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: 커피 기록 ID
    PresetId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: 프리셋 ID

  responses:
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: 인증 실패 (토큰 없음 또는 만료)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 기록을 찾을 수 없거나 다른 사용자 소유
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: 이미 사용 중인 이메일
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    RegisterRequest:
      type: object
      required: [email, password, username]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8
          example: mypassword123
        username:
          type: string
          example: coffeelover
        display_name:
          type: string
          description: 생략 시 username으로 대체
          example: 커피러버

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          example: mypassword123

    UserResponse:
      type: object
      required: [id, email, username, display_name]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        username:
          type: string
        display_name:
          type: string

    LogType:
      type: string
      enum: [cafe, brew]
      description: cafe = 바리스타가 추출, brew = 내가 직접 추출

    RoastLevel:
      type: string
      enum: [light, medium, dark]

    BrewMethod:
      type: string
      enum: [pour_over, immersion, aeropress, espresso, moka_pot, siphon, cold_brew, other]

    CafeDetail:
      type: object
      required: [cafe_name, coffee_name]
      properties:
        cafe_name:
          type: string
          example: 블루보틀 성수
        location:
          type: string
          nullable: true
        coffee_name:
          type: string
          example: 싱글 오리진 드립
        bean_origin:
          type: string
          nullable: true
        bean_process:
          type: string
          nullable: true
        roast_level:
          type: string
          enum: [light, medium, dark]
          nullable: true
        tasting_tags:
          type: array
          items:
            type: string
          example: [초콜릿, 체리]
        tasting_note:
          type: string
          nullable: true
        impressions:
          type: string
          nullable: true
        rating:
          type: number
          minimum: 0.5
          maximum: 5.0
          multipleOf: 0.5
          nullable: true

    BrewDetail:
      type: object
      required: [bean_name, brew_method]
      properties:
        bean_name:
          type: string
          example: 에티오피아 예가체프 G1
        bean_origin:
          type: string
          nullable: true
        bean_process:
          type: string
          nullable: true
        roast_level:
          type: string
          enum: [light, medium, dark]
          nullable: true
        roast_date:
          type: string
          format: date
          nullable: true
        tasting_tags:
          type: array
          items:
            type: string
        tasting_note:
          type: string
          nullable: true
        brew_method:
          $ref: '#/components/schemas/BrewMethod'
        brew_device:
          type: string
          nullable: true
          example: Origami
        coffee_amount_g:
          type: number
          nullable: true
        water_amount_ml:
          type: number
          nullable: true
        water_temp_c:
          type: number
          nullable: true
        brew_time_sec:
          type: integer
          nullable: true
        grind_size:
          type: string
          nullable: true
        brew_steps:
          type: array
          items:
            type: string
        impressions:
          type: string
          nullable: true
        rating:
          type: number
          minimum: 0.5
          maximum: 5.0
          multipleOf: 0.5
          nullable: true

    CoffeeLogResponse:
      type: object
      required: [id, user_id, recorded_at, companions, log_type, created_at, updated_at]
      properties:
        id:
          type: string
        user_id:
          type: string
        recorded_at:
          type: string
          format: date-time
        companions:
          type: array
          items:
            type: string
        log_type:
          $ref: '#/components/schemas/LogType'
        memo:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        cafe:
          $ref: '#/components/schemas/CafeDetail'
        brew:
          $ref: '#/components/schemas/BrewDetail'

    CreateLogRequest:
      type: object
      required: [recorded_at, log_type]
      properties:
        recorded_at:
          type: string
          description: "RFC3339 datetime (예: 2026-03-29T10:00:00Z 또는 2026-03-29T10:00:00+09:00)"
          example: '2026-03-29T10:00:00Z'
        companions:
          type: array
          items:
            type: string
        log_type:
          $ref: '#/components/schemas/LogType'
        memo:
          type: string
          nullable: true
        cafe:
          $ref: '#/components/schemas/CafeDetail'
          nullable: true
        brew:
          $ref: '#/components/schemas/BrewDetail'
          nullable: true

    UpdateLogRequest:
      type: object
      required: [recorded_at, log_type]
      properties:
        recorded_at:
          type: string
          description: "RFC3339 datetime (예: 2026-03-29T10:00:00Z 또는 2026-03-29T10:00:00+09:00)"
        companions:
          type: array
          items:
            type: string
        log_type:
          $ref: '#/components/schemas/LogType'
        memo:
          type: string
          nullable: true
        cafe:
          $ref: '#/components/schemas/CafeDetail'
          nullable: true
        brew:
          $ref: '#/components/schemas/BrewDetail'
          nullable: true

    ListLogsResponse:
      type: object
      required: [items, has_next]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CoffeeLogResponse'
        next_cursor:
          type: string
          nullable: true
          description: 다음 페이지 커서 (has_next가 false이면 null)
        has_next:
          type: boolean
          description: 다음 페이지 존재 여부

    SuggestionsResponse:
      type: object
      required: [suggestions]
      properties:
        suggestions:
          type: array
          items:
            type: string
          description: 빈도순 정렬된 자동완성 제안 목록

    CafePresetDetail:
      type: object
      required: [cafe_name, coffee_name]
      properties:
        cafe_name:
          type: string
          example: 블루보틀 성수
        coffee_name:
          type: string
          example: 싱글 오리진
        tasting_tags:
          type: array
          items:
            type: string
          example: [초콜릿, 체리]

    BrewPresetDetail:
      type: object
      required: [bean_name, brew_method]
      properties:
        bean_name:
          type: string
          example: 에티오피아 예가체프
        brew_method:
          $ref: '#/components/schemas/BrewMethod'
        recipe_detail:
          type: string
          nullable: true
        brew_steps:
          type: array
          items:
            type: string

    PresetResponse:
      type: object
      required: [id, user_id, name, log_type, created_at, updated_at]
      properties:
        id:
          type: string
        user_id:
          type: string
        name:
          type: string
          example: ���근길 아메리카노
        log_type:
          $ref: '#/components/schemas/LogType'
        last_used_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        cafe:
          $ref: '#/components/schemas/CafePresetDetail'
        brew:
          $ref: '#/components/schemas/BrewPresetDetail'

    CreatePresetRequest:
      type: object
      required: [name, log_type]
      properties:
        name:
          type: string
          example: 출근길 아메리카노
        log_type:
          $ref: '#/components/schemas/LogType'
        cafe:
          $ref: '#/components/schemas/CafePresetDetail'
          nullable: true
        brew:
          $ref: '#/components/schemas/BrewPresetDetail'
          nullable: true

    UpdatePresetRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        cafe:
          $ref: '#/components/schemas/CafePresetDetail'
          nullable: true
        brew:
          $ref: '#/components/schemas/BrewPresetDetail'
          nullable: true

    ListPresetsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PresetResponse'

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: 이메일 또는 비밀번호가 올바르지 않습니다
        field:
          type: string
          description: "ValidationError일 때만 포함. 오류가 발생한 필드 경로 (예: email)"
          example: email
